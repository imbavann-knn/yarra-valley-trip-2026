<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOUR HEAD · Expenses · Australia '26</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --burgundy: #6B1D3D;
  --wine:     #8B2252;
  --cream:    #FDF6E3;
  --cream-mid: #F5EAC8;
  --cream-warm: #EEE0C4;
  --rose-light: #EDD0D0;
  --sage:     #4a8a5c;
  --gold:     #C4964A;
  --brown:    #8a7060;
  --dark:     #2E1520;
  --f-display: 'Playfair Display', serif;
  --f-ui:     'DM Sans', sans-serif;
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--cream); color: var(--dark); font-family: var(--f-ui); font-size: 15px; min-height: 100vh; }

nav {
  background: var(--burgundy); height: 52px; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(107,29,61,0.3);
}
.nav-logo { font-family: var(--f-display); font-style: italic; font-size: 18px; color: white; }
.nav-logo span { font-family: var(--f-ui); font-style: normal; font-size: 11px; opacity: 0.6; margin-left: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
.nav-back { color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
.nav-back:hover { color: white; }

.page-header {
  background: linear-gradient(135deg, var(--burgundy) 0%, var(--wine) 60%, #a8366a 100%);
  color: white; padding: 44px 20px 56px; text-align: center;
}
.page-header h1 { font-family: var(--f-display); font-size: 38px; font-style: italic; font-weight: 400; margin-bottom: 6px; }
.page-header p { opacity: 0.7; font-size: 13px; letter-spacing: 0.04em; }
.rate-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
  border-radius: 40px; padding: 7px 18px; margin-top: 18px; font-size: 13px;
}
.rate-pill input {
  background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.45);
  color: white; font-family: var(--f-ui); font-size: 14px; font-weight: 700;
  width: 54px; text-align: center; outline: none;
}

.main { max-width: 980px; margin: 0 auto; padding: 0 16px 80px; }

/* BALANCE CARDS */
.balances-wrap { margin-top: -28px; }
.balances-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
@media(max-width:720px) { .balances-grid { grid-template-columns: repeat(3, 1fr); } }
@media(max-width:460px) { .balances-grid { grid-template-columns: repeat(2, 1fr); } }
.balance-card {
  background: white; border-radius: var(--r-md); padding: 18px 12px;
  text-align: center; border: 1.5px solid var(--rose-light);
  box-shadow: 0 4px 14px rgba(107,29,61,0.07); transition: transform 0.15s;
}
.balance-card:hover { transform: translateY(-2px); }
.bc-emoji { font-size: 28px; margin-bottom: 8px; }
.bc-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
.bc-amount { font-family: var(--f-display); font-size: 18px; font-style: italic; }
.bc-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-top: 3px; }
.balance-card.positive .bc-amount, .balance-card.positive .bc-label { color: var(--sage); }
.balance-card.negative .bc-amount, .balance-card.negative .bc-label { color: var(--wine); }
.balance-card.settled  .bc-amount, .balance-card.settled  .bc-label { color: var(--brown); opacity: 0.7; }

.section { margin-top: 36px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-family: var(--f-display); font-size: 24px; font-style: italic; color: var(--burgundy); }

/* SETTLE UP */
.settle-card { background: white; border-radius: var(--r-md); border: 1.5px solid var(--rose-light); overflow: hidden; }
.settle-row { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--cream-mid); }
.settle-row:last-child { border-bottom: none; }
.st-from { font-weight: 600; font-size: 14px; }
.st-arrow { color: var(--brown); font-size: 18px; }
.st-to { font-weight: 600; font-size: 14px; }
.st-amt { margin-left: auto; font-family: var(--f-display); font-size: 19px; font-style: italic; color: var(--wine); }
.settle-empty { padding: 28px; text-align: center; color: var(--sage); font-size: 14px; font-weight: 500; }
.settle-footer { padding: 10px 20px; background: var(--cream-mid); display: flex; justify-content: flex-end; }
.copy-btn { font-size: 12px; color: var(--burgundy); background: none; border: 1.5px solid var(--rose-light); border-radius: 20px; padding: 5px 14px; cursor: pointer; font-family: var(--f-ui); font-weight: 600; transition: all 0.15s; }
.copy-btn:hover { background: var(--burgundy); color: white; border-color: var(--burgundy); }

/* ADD BUTTON */
.add-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--burgundy); color: white; border: none;
  border-radius: var(--r-md); padding: 11px 22px;
  font-family: var(--f-ui); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.2s, transform 0.15s;
}
.add-btn:hover { background: var(--wine); transform: translateY(-1px); }
.add-btn-plus { font-size: 20px; line-height: 1; }

/* FORM CARD */
.form-card {
  background: white; border-radius: var(--r-lg);
  border: 1.5px solid var(--rose-light); box-shadow: 0 6px 28px rgba(107,29,61,0.12);
  overflow: hidden; margin-bottom: 20px; display: none;
}
.form-card.open { display: block; }
.form-head {
  background: linear-gradient(135deg, var(--burgundy) 0%, var(--wine) 100%);
  color: white; padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.form-head h3 { font-family: var(--f-display); font-size: 20px; font-style: italic; font-weight: 400; }
.close-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.close-btn:hover { background: rgba(255,255,255,0.3); }

.form-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:560px) { .form-row { grid-template-columns: 1fr; } }

.field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 9px; }
.field input, .field select {
  width: 100%; border: 1.5px solid var(--cream-warm); border-radius: var(--r-sm);
  padding: 10px 14px; font-family: var(--f-ui); font-size: 14px; color: var(--dark);
  background: var(--cream); outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--burgundy); background: white; }
.amt-row { display: flex; gap: 8px; }
.amt-row input { flex: 1; }
.amt-row select { width: 84px; flex-shrink: 0; }

/* CATEGORY + PAID-BY PILLS */
.pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
.pp input[type=radio] { display: none; }
.pp label {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 15px; border-radius: 40px;
  border: 1.5px solid var(--cream-warm);
  font-size: 13px; font-weight: 500; cursor: pointer;
  background: var(--cream); color: var(--dark);
  transition: all 0.15s; user-select: none;
}
.pp input:checked + label { background: var(--burgundy); color: white; border-color: var(--burgundy); }
.cat-pill input[type=radio] { display: none; }
.cat-pill label {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 40px;
  border: 1.5px solid var(--cream-warm);
  font-size: 13px; cursor: pointer;
  background: var(--cream); transition: all 0.15s; user-select: none;
}
.cat-pill input:checked + label { background: var(--gold); color: white; border-color: var(--gold); }

/* SPLIT WITH — PAX PILLS */
.split-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.split-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); }
.split-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.split-action-btn { font-size: 12px; color: var(--burgundy); background: none; border: none; cursor: pointer; font-weight: 700; font-family: var(--f-ui); text-decoration: underline; white-space: nowrap; }

.split-section { margin-bottom: 12px; }
.split-sub-lbl { font-size: 11px; font-weight: 600; color: var(--brown); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.split-sub-note { font-weight: 400; opacity: 0.8; }

/* SPLIT PILL with half/full pax toggle */
.split-pill {
  display: inline-flex; align-items: stretch;
  border: 1.5px solid var(--cream-warm); border-radius: 40px;
  overflow: hidden; transition: border-color 0.15s, background 0.15s;
}
.sp-main {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px 7px 14px;
  font-size: 13px; font-weight: 500; color: var(--dark);
  cursor: pointer; user-select: none;
}
.sp-pax { display: flex; border-left: 1px solid var(--cream-warm); }
.sp-btn {
  padding: 6px 10px; font-size: 12px; font-weight: 700;
  cursor: pointer; color: var(--brown); background: none; border: none;
  font-family: var(--f-ui); line-height: 1;
}
.sp-btn + .sp-btn { border-left: 1px solid var(--cream-warm); }
/* Full pax state */
.split-pill.pax-1 { border-color: var(--burgundy); background: var(--burgundy); }
.split-pill.pax-1 .sp-main { color: white; }
.split-pill.pax-1 .sp-pax { border-left-color: rgba(255,255,255,0.25); }
.split-pill.pax-1 .sp-btn { color: rgba(255,255,255,0.4); border-left-color: rgba(255,255,255,0.2); }
.split-pill.pax-1 .sp-btn.act { color: white; }
/* Half pax state */
.split-pill.pax-h { border-color: var(--gold); background: var(--gold); }
.split-pill.pax-h .sp-main { color: white; }
.split-pill.pax-h .sp-pax { border-left-color: rgba(255,255,255,0.25); }
.split-pill.pax-h .sp-btn { color: rgba(255,255,255,0.4); border-left-color: rgba(255,255,255,0.2); }
.split-pill.pax-h .sp-btn.act { color: white; }

/* PER PERSON PREVIEW */
.ppp { background: var(--cream-mid); border-radius: var(--r-sm); padding: 14px 16px; display: none; }
.ppp.show { display: block; }
.ppp-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--brown); margin-bottom: 10px; }
.ppp-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.ppp-chip { background: white; border-radius: 6px; padding: 7px 12px; font-size: 13px; border: 1px solid var(--rose-light); line-height: 1.4; }
.ppp-chip b { color: var(--burgundy); }
.kid-note { font-size: 11px; color: var(--brown); display: block; margin-top: 1px; }
.ppp-divider { width: 100%; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--brown); margin: 8px 0 4px; }

/* FORM FOOTER */
.form-footer { padding: 4px 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel { background: var(--cream-mid); color: var(--dark); border: none; border-radius: var(--r-sm); padding: 10px 20px; font-family: var(--f-ui); font-size: 14px; cursor: pointer; }
.btn-save { background: var(--burgundy); color: white; border: none; border-radius: var(--r-sm); padding: 10px 26px; font-family: var(--f-ui); font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-save:hover { background: var(--wine); }

/* EXPENSE LOG */
.log-wrap { border-radius: var(--r-md); overflow: hidden; border: 1.5px solid var(--rose-light); background: white; }
.log-header {
  display: grid; grid-template-columns: 72px 1fr 100px 96px 90px 110px 72px;
  gap: 10px; padding: 10px 16px;
  background: var(--cream-mid); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--brown);
}
.exp-row {
  display: grid; grid-template-columns: 72px 1fr 100px 96px 90px 110px 72px;
  gap: 10px; padding: 13px 16px; align-items: center;
  border-top: 1px solid var(--cream-mid); transition: background 0.12s;
}
.exp-row:hover { background: var(--cream); }
.e-date { font-size: 12px; color: var(--brown); }
.e-desc { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.e-cat { font-size: 12px; color: var(--brown); display: flex; align-items: center; gap: 5px; }
.e-amount { font-family: var(--f-display); font-size: 16px; font-style: italic; }
.e-paid { font-size: 13px; }
.e-split { font-size: 12px; color: var(--brown); line-height: 1.4; }
.e-actions { display: flex; gap: 5px; }
.e-actions button { background: none; border: 1.5px solid var(--cream-warm); border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: 13px; transition: all 0.13s; }
.e-actions button:hover { border-color: var(--burgundy); background: var(--cream); }
.e-actions .del:hover { border-color: var(--wine); }
.log-totals { padding: 12px 16px; background: var(--cream-mid); display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; border-top: 1.5px solid var(--rose-light); }
.log-totals strong { color: var(--burgundy); }
.log-empty { padding: 56px 20px; text-align: center; }
.log-empty-icon { font-size: 44px; margin-bottom: 14px; }
.log-empty p { color: var(--brown); font-style: italic; font-size: 15px; }

@media(max-width:820px) {
  .log-header { display: none; }
  .exp-row { grid-template-columns: 1fr auto; gap: 4px 8px; grid-template-rows: auto auto auto; padding: 14px 16px; }
  .e-date   { grid-column:1; grid-row:2; font-size:11px; }
  .e-desc   { grid-column:1; grid-row:1; }
  .e-cat    { display:none; }
  .e-amount { grid-column:2; grid-row:1; text-align:right; }
  .e-paid   { grid-column:2; grid-row:2; font-size:11px; text-align:right; color:var(--brown); }
  .e-split  { grid-column:1; grid-row:3; font-size:11px; }
  .e-actions { grid-column:2; grid-row:3; justify-content:flex-end; }
}

/* DELETE MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; display:none; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.confirm-box { background:white; border-radius:var(--r-lg); padding:36px 32px; max-width:360px; width:92%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
.confirm-box h4 { font-family:var(--f-display); font-size:22px; font-style:italic; color:var(--burgundy); margin-bottom:10px; }
.confirm-box p { color:var(--brown); font-size:14px; margin-bottom:28px; line-height:1.5; }
.confirm-btns { display:flex; gap:12px; justify-content:center; }
.btn-no  { background:var(--cream-mid); border:none; border-radius:var(--r-sm); padding:11px 24px; font-family:var(--f-ui); font-size:14px; cursor:pointer; }
.btn-yes { background:var(--wine); color:white; border:none; border-radius:var(--r-sm); padding:11px 24px; font-family:var(--f-ui); font-size:14px; font-weight:700; cursor:pointer; }

/* TOAST */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--dark); color:white; padding:12px 24px; border-radius:40px; font-size:13px; z-index:300; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">YOUR HEAD <span>Expenses</span></div>
  <a class="nav-back" href="index.html">← Trip Site</a>
</nav>

<div class="page-header">
  <h1>Group Expenses</h1>
  <p>28 Jul – 6 Aug 2026 · Melbourne &amp; Yarra Valley</p>
  <div class="rate-pill">
    <span>1 AUD =</span>
    <input type="number" id="rate-input" value="0.87" step="0.001" min="0.1">
    <span>SGD</span>
  </div>
</div>

<div class="main">

  <div class="balances-wrap">
    <div class="balances-grid" id="balances-grid"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-title">Settle Up</div></div>
    <div class="settle-card" id="settle-card"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Expenses</div>
      <button class="add-btn" id="add-btn"><span class="add-btn-plus">+</span> Add Expense</button>
    </div>

    <div class="form-card" id="form-card">
      <div class="form-head">
        <h3 id="form-title">New Expense</h3>
        <button class="close-btn" id="close-form">✕</button>
      </div>
      <div class="form-body">
        <input type="hidden" id="edit-id">
        <div class="field">
          <label>Description</label>
          <input type="text" id="f-desc" placeholder="e.g. Dinner at De Bortoli" autocomplete="off">
        </div>
        <div class="form-row">
          <div class="field">
            <label>Amount</label>
            <div class="amt-row">
              <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01">
              <select id="f-currency"><option value="AUD">AUD</option><option value="SGD">SGD</option></select>
            </div>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date">
          </div>
        </div>
        <div class="field">
          <label>Category</label>
          <div class="pill-group" id="cat-group"></div>
        </div>
        <div class="field">
          <label>Paid by</label>
          <div class="pill-group" id="paidby-group"></div>
        </div>
        <div>
          <div class="split-bar">
            <div class="split-lbl">Split with</div>
            <div class="split-actions">
              <button class="split-action-btn" id="toggle-adults-btn">Deselect Adults</button>
              <button class="split-action-btn" id="kids-half-btn">Kids ½</button>
              <button class="split-action-btn" id="kids-full-btn">Kids Full</button>
            </div>
          </div>
          <div id="split-group"></div>
        </div>
        <div class="ppp" id="ppp">
          <div class="ppp-lbl">Effective Cost Per Person</div>
          <div class="ppp-chips" id="ppp-chips"></div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-save" id="btn-save">Save Expense</button>
      </div>
    </div>

    <div id="log-wrap"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="confirm-box">
    <h4>Delete this?</h4>
    <p id="confirm-desc">This can't be undone.</p>
    <div class="confirm-btns">
      <button class="btn-no" id="btn-no">Keep it</button>
      <button class="btn-yes" id="btn-yes">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════
// PEOPLE
// Kids' costs auto-roll-up to their parents' balances.
// ════════════════════════════════
const ALL_PEOPLE = [
  { name: 'Eevann', emoji: '🧔🏻', isKid: false },
  { name: 'Yuwen',  emoji: '👩🏻',  isKid: false },
  { name: 'Joshua', emoji: '🏐',    isKid: false },
  { name: 'Jorena', emoji: '🥂',    isKid: false },
  { name: 'Densil', emoji: '🏍️',   isKid: false },
  { name: 'Emma',    emoji: '🧒🏻',  isKid: true, parents: ['Eevann', 'Yuwen'] },
  { name: 'Jophiel', emoji: '👦🏻',  isKid: true, parents: ['Joshua', 'Jorena'] },
  { name: 'Joash',   emoji: '👶🏻',  isKid: true, parents: ['Joshua', 'Jorena'] },
];
const ADULTS = ALL_PEOPLE.filter(p => !p.isKid);
const KIDS   = ALL_PEOPLE.filter(p =>  p.isKid);

const CATS = [
  { id: 'meals',      label: 'Meals',      icon: '🍽️' },
  { id: 'activities', label: 'Activities', icon: '🎡' },
  { id: 'transport',  label: 'Transport',  icon: '🚗' },
  { id: 'stay',       label: 'Stay',       icon: '🏠' },
  { id: 'shopping',   label: 'Shopping',   icon: '🛒' },
  { id: 'other',      label: 'Other',      icon: '📦' },
];

const LS_EXP  = 'yh_expenses_2026';
const LS_RATE = 'yh_aud_rate';

// ════════════════════════════════
// STATE
// splitWith stored as [{name, pax}] — pax: 0.5 or 1
// splitState: form UI state {name: 0|0.5|1}
// ════════════════════════════════
let expenses = JSON.parse(localStorage.getItem(LS_EXP) || '[]').map(migrate);
let rate     = parseFloat(localStorage.getItem(LS_RATE) || '0.87');
let splitState = {};
let deleteId   = null;

function migrate(exp) {
  if (exp.splitWith && exp.splitWith.length > 0 && typeof exp.splitWith[0] === 'string') {
    exp.splitWith = exp.splitWith.map(name => ({ name, pax: 1 }));
  }
  return exp;
}

// ════════════════════════════════
// UTILS
// ════════════════════════════════
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const toSGD  = (amt, cur) => cur === 'SGD' ? amt : amt * rate;
const sym    = cur => cur === 'AUD' ? 'A$' : 'S$';
const fmtAmt = (amt, cur) => `${sym(cur)}${Number(amt).toFixed(2)}`;
const fmtSGD = amt => `S$${Math.abs(amt).toFixed(2)}`;
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmtDate  = str => new Date(str + 'T12:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
const personOf = name => ALL_PEOPLE.find(p => p.name === name) || { emoji: '👤', name };
const catOf    = id   => CATS.find(c => c.id === id) || CATS[CATS.length - 1];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2600);
}
function saveData() { localStorage.setItem(LS_EXP, JSON.stringify(expenses)); }

// ════════════════════════════════
// CALCULATIONS
// Kids' debts roll equally to their parents.
// Only adults appear in balance cards / settlement.
// ════════════════════════════════
function calcBalances() {
  const bal = {};
  ADULTS.forEach(p => bal[p.name] = 0);

  expenses.forEach(exp => {
    const amtSGD   = toSGD(exp.amount, exp.currency);
    const sw       = exp.splitWith || [];
    const totalPax = sw.reduce((s, x) => s + x.pax, 0);
    if (!totalPax) return;

    const perPax = amtSGD / totalPax;

    if (bal[exp.paidBy] !== undefined) bal[exp.paidBy] += amtSGD;

    sw.forEach(x => {
      const person = personOf(x.name);
      const cost   = perPax * x.pax;
      if (person.isKid && person.parents && person.parents.length) {
        const perParent = cost / person.parents.length;
        person.parents.forEach(parent => {
          if (bal[parent] !== undefined) bal[parent] -= perParent;
        });
      } else if (!person.isKid && bal[person.name] !== undefined) {
        bal[person.name] -= cost;
      }
    });
  });

  return bal;
}

function getSettlements(bal) {
  const debtors = [], creditors = [];
  Object.entries(bal).forEach(([name, b]) => {
    if (b >  0.005) creditors.push({ name, amt: b });
    if (b < -0.005) debtors.push({ name, amt: -b });
  });
  debtors.sort((a, b) => b.amt - a.amt);
  creditors.sort((a, b) => b.amt - a.amt);
  const txns = [];
  while (debtors.length && creditors.length) {
    const d = debtors[0], c = creditors[0];
    const s = Math.min(d.amt, c.amt);
    if (s > 0.005) txns.push({ from: d.name, to: c.name, amt: s });
    d.amt -= s; c.amt -= s;
    if (d.amt < 0.005) debtors.shift();
    if (c.amt < 0.005) creditors.shift();
  }
  return txns;
}

// ════════════════════════════════
// RENDER
// ════════════════════════════════
function render() { renderBalances(); renderSettle(); renderLog(); }

function renderBalances() {
  const bal = calcBalances();
  document.getElementById('balances-grid').innerHTML = ADULTS.map(p => {
    const b   = bal[p.name];
    const cls = b > 0.005 ? 'positive' : b < -0.005 ? 'negative' : 'settled';
    const lbl = b > 0.005 ? 'receives'  : b < -0.005 ? 'owes'     : 'settled ✓';
    return `<div class="balance-card ${cls}">
      <div class="bc-emoji">${p.emoji}</div>
      <div class="bc-name">${p.name}</div>
      <div class="bc-amount">${fmtSGD(b)}</div>
      <div class="bc-label">${lbl}</div>
    </div>`;
  }).join('');
}

function renderSettle() {
  const txns = getSettlements(calcBalances());
  const card = document.getElementById('settle-card');
  if (!txns.length) {
    card.innerHTML = `<div class="settle-empty">✅ All settled up!</div>`;
    return;
  }
  card.innerHTML = txns.map(t => {
    const fr = personOf(t.from), to = personOf(t.to);
    return `<div class="settle-row">
      <span class="st-from">${fr.emoji} ${fr.name}</span>
      <span class="st-arrow">→</span>
      <span class="st-to">${to.emoji} ${to.name}</span>
      <span class="st-amt">${fmtSGD(t.amt)}</span>
    </div>`;
  }).join('') + `<div class="settle-footer"><button class="copy-btn" onclick="copySummary()">📋 Copy summary</button></div>`;
}

function renderLog() {
  const wrap = document.getElementById('log-wrap');
  if (!expenses.length) {
    wrap.innerHTML = `<div class="log-wrap"><div class="log-empty">
      <div class="log-empty-icon">🧾</div><p>No expenses yet — add your first one!</p>
    </div></div>`;
    return;
  }

  const sorted   = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
  const totalSGD = expenses.reduce((s, e) => s + toSGD(e.amount, e.currency), 0);
  const byAUD    = expenses.filter(e => e.currency === 'AUD').reduce((s, e) => s + e.amount, 0);
  const bySGDdir = expenses.filter(e => e.currency === 'SGD').reduce((s, e) => s + e.amount, 0);

  const rows = sorted.map(exp => {
    const sw       = exp.splitWith || [];
    const totalPax = sw.reduce((s, x) => s + x.pax, 0);
    const perPax   = totalPax ? exp.amount / totalPax : 0;
    const kidSW    = sw.filter(x => personOf(x.name).isKid);
    const p = personOf(exp.paidBy);
    const c = catOf(exp.category);

    let splitTxt = `${totalPax} pax`;
    if (kidSW.length) splitTxt += ' · ' + kidSW.map(x => `${personOf(x.name).emoji}${x.pax === 0.5 ? '½' : ''}`).join('');
    const perPaxTxt = perPax ? `${sym(exp.currency)}${perPax.toFixed(2)}/pax` : '';

    return `<div class="exp-row">
      <div class="e-date">${fmtDate(exp.date)}</div>
      <div class="e-desc" title="${exp.description}">${exp.description}</div>
      <div class="e-cat">${c.icon} ${c.label}</div>
      <div class="e-amount">${fmtAmt(exp.amount, exp.currency)}</div>
      <div class="e-paid">${p.emoji} ${p.name}</div>
      <div class="e-split">${splitTxt}<br><span style="opacity:0.7">${perPaxTxt}</span></div>
      <div class="e-actions">
        <button onclick="editExpense('${exp.id}')" title="Edit">✏️</button>
        <button class="del" onclick="confirmDelete('${exp.id}','${exp.description.replace(/'/g,"\\'")}')" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join('');

  const totals = [
    `<span>${expenses.length} expense${expenses.length !== 1 ? 's' : ''}</span>`,
    byAUD    ? `<span>AUD: <strong>A$${byAUD.toFixed(2)}</strong></span>` : '',
    bySGDdir ? `<span>SGD: <strong>S$${bySGDdir.toFixed(2)}</strong></span>` : '',
    `<span style="margin-left:auto">All in SGD: <strong>S$${totalSGD.toFixed(2)}</strong></span>`,
  ].filter(Boolean).join('');

  wrap.innerHTML = `<div class="log-wrap">
    <div class="log-header"><div>Date</div><div>Description</div><div>Category</div><div>Amount</div><div>Paid by</div><div>Split</div><div></div></div>
    ${rows}
    <div class="log-totals">${totals}</div>
  </div>`;
}

// ════════════════════════════════
// FORM — STATIC PIECES
// ════════════════════════════════
function buildStaticForm() {
  document.getElementById('cat-group').innerHTML = CATS.map((c, i) =>
    `<div class="cat-pill"><input type="radio" name="fcat" id="cat${c.id}" value="${c.id}" ${!i?'checked':''}>
     <label for="cat${c.id}">${c.icon} ${c.label}</label></div>`
  ).join('');

  document.getElementById('paidby-group').innerHTML = ADULTS.map((p, i) =>
    `<div class="pp"><input type="radio" name="fpaid" id="pb${p.name}" value="${p.name}" ${!i?'checked':''}>
     <label for="pb${p.name}">${p.emoji} ${p.name}</label></div>`
  ).join('');

  document.getElementById('f-date').value = todayISO();
  document.getElementById('f-amount').addEventListener('input', updatePPP);
  document.getElementById('f-currency').addEventListener('change', updatePPP);
}

// ════════════════════════════════
// SPLIT STATE + PILLS
// ════════════════════════════════
function initSplitState(preset) {
  ALL_PEOPLE.forEach(p => {
    if (preset) {
      const found = preset.find(s => s.name === p.name);
      splitState[p.name] = found ? found.pax : 0;
    } else {
      splitState[p.name] = p.isKid ? 0 : 1;
    }
  });
}

function renderSplitPill(person) {
  const pax = splitState[person.name] || 0;
  const cls = pax === 1 ? 'pax-1' : pax === 0.5 ? 'pax-h' : '';
  const n   = person.name;
  const isKid = person.isKid;
  return `<div class="split-pill ${cls}">
    <div class="sp-main" onclick="toggleSplitPerson('${n}',${isKid})">
      <span>${person.emoji}</span><span>${n}</span>
    </div>
    ${pax > 0 ? `<div class="sp-pax">
      <button class="sp-btn${pax===0.5?' act':''}" onclick="setSplitPax('${n}',0.5)">½</button>
      <button class="sp-btn${pax===1?' act':''}" onclick="setSplitPax('${n}',1)">1</button>
    </div>` : ''}
  </div>`;
}

function renderSplitPills() {
  document.getElementById('split-group').innerHTML = `
    <div class="split-section">
      <div class="pill-group">${ADULTS.map(p => renderSplitPill(p)).join('')}</div>
    </div>
    <div class="split-section" style="margin-top:14px">
      <div class="split-sub-lbl">Kids <span class="split-sub-note">tap to include · ½ for meals, 1 for tickets</span></div>
      <div class="pill-group">${KIDS.map(p => renderSplitPill(p)).join('')}</div>
    </div>`;
  const allIn = ADULTS.every(p => splitState[p.name] > 0);
  document.getElementById('toggle-adults-btn').textContent = allIn ? 'Deselect Adults' : 'Select Adults';
}

function toggleSplitPerson(name, isKid) {
  const cur = splitState[name] || 0;
  splitState[name] = cur > 0 ? 0 : (isKid ? 0.5 : 1);
  renderSplitPills();
  updatePPP();
}

function setSplitPax(name, pax) {
  event.stopPropagation();
  splitState[name] = pax;
  renderSplitPills();
  updatePPP();
}

function toggleAllAdults() {
  const allIn = ADULTS.every(p => splitState[p.name] > 0);
  ADULTS.forEach(p => { splitState[p.name] = allIn ? 0 : 1; });
  renderSplitPills();
  updatePPP();
}

function setAllKidsPax(pax) {
  KIDS.forEach(p => { splitState[p.name] = pax; });
  renderSplitPills();
  updatePPP();
}

// ════════════════════════════════
// PER PERSON PREVIEW
// Shows effective adult cost (own pax + their kids' portion)
// ════════════════════════════════
function updatePPP() {
  const amt = parseFloat(document.getElementById('f-amount').value);
  const cur = document.getElementById('f-currency').value;
  const ppp = document.getElementById('ppp');

  const included = ALL_PEOPLE.filter(p => (splitState[p.name] || 0) > 0);
  if (!amt || !included.length) { ppp.classList.remove('show'); return; }

  const totalPax = included.reduce((s, p) => s + splitState[p.name], 0);
  const perPax   = amt / totalPax;

  // Effective adult costs
  const eff = {};
  ADULTS.forEach(a => { if (splitState[a.name] > 0) eff[a.name] = perPax * splitState[a.name]; });
  KIDS.forEach(kid => {
    const kp = splitState[kid.name] || 0;
    if (kp > 0 && kid.parents && kid.parents.length) {
      const kidCost = perPax * kp;
      kid.parents.forEach(parent => {
        if (eff[parent] !== undefined) eff[parent] += kidCost / kid.parents.length;
      });
    }
  });

  const adultChips = Object.entries(eff).map(([name, cost]) => {
    const p      = personOf(name);
    const myKids = KIDS.filter(k => (splitState[k.name]||0) > 0 && k.parents && k.parents.includes(name));
    const note   = myKids.length ? `<span class="kid-note">incl. ${myKids.map(k=>`${k.emoji}${splitState[k.name]===0.5?'½':''}`).join(' ')}</span>` : '';
    return `<div class="ppp-chip">${p.emoji} ${name}: <b>${sym(cur)}${cost.toFixed(2)}</b>${note}</div>`;
  }).join('');

  const kidsIncluded = KIDS.filter(k => (splitState[k.name]||0) > 0);
  const kidChips = kidsIncluded.map(kid => {
    const cost   = perPax * splitState[kid.name];
    const paxLbl = splitState[kid.name] === 0.5 ? '½ pax' : 'full pax';
    return `<div class="ppp-chip">${kid.emoji} ${kid.name}: <b>${sym(cur)}${cost.toFixed(2)}</b> <span class="kid-note">${paxLbl} · split to ${kid.parents.join(' + ')}</span></div>`;
  }).join('');

  ppp.classList.add('show');
  document.getElementById('ppp-chips').innerHTML =
    adultChips + (kidChips ? `<div class="ppp-divider">Kids (for reference)</div>${kidChips}` : '');
}

// ════════════════════════════════
// OPEN / CLOSE FORM
// ════════════════════════════════
function openForm(preset) {
  const fc = document.getElementById('form-card');
  fc.classList.add('open');
  if (!preset) {
    document.getElementById('edit-id').value = '';
    document.getElementById('form-title').textContent = 'New Expense';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('f-currency').value = 'AUD';
    document.getElementById('f-date').value = todayISO();
    document.querySelectorAll('[name="fcat"]')[0].checked = true;
    document.querySelectorAll('[name="fpaid"]')[0].checked = true;
    document.getElementById('ppp').classList.remove('show');
  }
  initSplitState(preset);
  renderSplitPills();
  if (preset) updatePPP();
  setTimeout(() => fc.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}
function closeForm() { document.getElementById('form-card').classList.remove('open'); }

// ════════════════════════════════
// SAVE
// ════════════════════════════════
function saveExpense() {
  const desc  = document.getElementById('f-desc').value.trim();
  const amt   = parseFloat(document.getElementById('f-amount').value);
  const cur   = document.getElementById('f-currency').value;
  const date  = document.getElementById('f-date').value;
  const cat   = document.querySelector('[name="fcat"]:checked')?.value || 'other';
  const paid  = document.querySelector('[name="fpaid"]:checked')?.value;
  const split = ALL_PEOPLE.filter(p => (splitState[p.name]||0) > 0)
                           .map(p => ({ name: p.name, pax: splitState[p.name] }));
  const eid   = document.getElementById('edit-id').value;

  if (!desc)            return alert('Please enter a description.');
  if (!amt || amt <= 0) return alert('Please enter a valid amount.');
  if (!paid)            return alert('Please select who paid.');
  if (!split.length)    return alert('Please select at least one person to split with.');

  const exp = { id: eid || uid(), date, description: desc, category: cat, amount: amt, currency: cur, paidBy: paid, splitWith: split };
  if (eid) {
    const i = expenses.findIndex(e => e.id === eid);
    if (i !== -1) expenses[i] = exp;
    showToast('Expense updated ✓');
  } else {
    expenses.unshift(exp);
    showToast('Expense added ✓');
  }
  saveData(); closeForm(); render();
}

// ════════════════════════════════
// EDIT / DELETE
// ════════════════════════════════
function editExpense(id) {
  const exp = expenses.find(e => e.id === id);
  if (!exp) return;
  document.getElementById('edit-id').value = exp.id;
  document.getElementById('form-title').textContent = 'Edit Expense';
  document.getElementById('f-desc').value    = exp.description;
  document.getElementById('f-amount').value  = exp.amount;
  document.getElementById('f-currency').value = exp.currency;
  document.getElementById('f-date').value    = exp.date;
  const cr = document.getElementById(`cat${exp.category}`); if (cr) cr.checked = true;
  const pr = document.getElementById(`pb${exp.paidBy}`);    if (pr) pr.checked = true;
  openForm(exp.splitWith);
}

function confirmDelete(id, desc) {
  deleteId = id;
  document.getElementById('confirm-desc').textContent = `"${desc}"`;
  document.getElementById('overlay').classList.add('show');
}
function doDelete() {
  if (!deleteId) return;
  expenses = expenses.filter(e => e.id !== deleteId);
  deleteId = null;
  saveData();
  document.getElementById('overlay').classList.remove('show');
  showToast('Expense deleted');
  render();
}

// ════════════════════════════════
// COPY SUMMARY
// ════════════════════════════════
function copySummary() {
  const bal   = calcBalances();
  const txns  = getSettlements(bal);
  const total = expenses.reduce((s, e) => s + toSGD(e.amount, e.currency), 0);
  let txt = `YOUR HEAD — Expense Summary 🌏\n`;
  txt += `${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}\n\n`;
  txt += `💰 Balances:\n`;
  ADULTS.forEach(p => {
    const b = bal[p.name];
    txt += `  ${p.emoji} ${p.name}: ${b>0.005?'+':''}${fmtSGD(b)} ${b>0.005?'(receives)':b<-0.005?'(owes)':'(settled)'}\n`;
  });
  txt += `\n💸 To settle:\n`;
  if (!txns.length) txt += `  ✅ All settled!\n`;
  else txns.forEach(t => { txt += `  ${t.from} → ${t.to}: ${fmtSGD(t.amt)}\n`; });
  txt += `\n📊 Total: S$${total.toFixed(2)} across ${expenses.length} expenses`;
  navigator.clipboard.writeText(txt).then(() => showToast('Summary copied! 📋'));
}

// ════════════════════════════════
// EVENTS
// ════════════════════════════════
document.getElementById('add-btn').addEventListener('click', () => openForm(null));
document.getElementById('close-form').addEventListener('click', closeForm);
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('btn-save').addEventListener('click', saveExpense);
document.getElementById('toggle-adults-btn').addEventListener('click', toggleAllAdults);
document.getElementById('kids-half-btn').addEventListener('click', () => setAllKidsPax(0.5));
document.getElementById('kids-full-btn').addEventListener('click', () => setAllKidsPax(1));
document.getElementById('btn-no').addEventListener('click', () => document.getElementById('overlay').classList.remove('show'));
document.getElementById('btn-yes').addEventListener('click', doDelete);
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id==='overlay') document.getElementById('overlay').classList.remove('show'); });
document.getElementById('rate-input').addEventListener('change', () => {
  rate = parseFloat(document.getElementById('rate-input').value) || 0.87;
  localStorage.setItem(LS_RATE, rate);
  render();
});

// ════════════════════════════════
// INIT
// ════════════════════════════════
document.getElementById('rate-input').value = rate;
buildStaticForm();
initSplitState(null);
render();
</script>
